endpoint:
  base_url: "https://token-plan-sgp.xiaomimimo.com/anthropic"
  api_type: "anthropic"
  api_key: "$MIMO_API_KEY"
  model: "mimo-v2.5"

run:
  repeats: 5
  warmup: 1
  decode_max_tokens: 2048
  ttft_only_max_tokens: 1
  request_timeout_s: 600
  concurrency_levels: [1]  # 1=serial latency; >1=throughput

matrix:
  context_lengths: [1024, 4096, 8192, 16384, 32768, 65536, 131072]
  domains:
    coding:       { lengths: all }
    doc_analysis: { lengths: all }
    math:         { lengths: [1024] }
    writing:      { lengths: [1024] }
  test_prefix_caching: true

output:
  dir: "results"
